name: Release Please
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to (re)build and publish (e.g. v0.1.0). Skips release-please."
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  resolve-release:
    needs: release-please
    if: |
      always() &&
      ((github.event_name == 'push' && needs.release-please.outputs.release_created == 'true') ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.pick.outputs.tag_name }}
    steps:
      - id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag_name=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=${{ needs.release-please.outputs.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: resolve-release
    if: ${{ !cancelled() && needs.resolve-release.result == 'success' }}
    strategy:
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest,  use_cross: true  }
          - { target: aarch64-apple-darwin,     os: macos-latest,   use_cross: false }
          - { target: x86_64-apple-darwin,      os: macos-latest,   use_cross: false }
          - { target: x86_64-pc-windows-msvc,   os: windows-latest, use_cross: false }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
      # Single-binary form. For split-binary form, append csm-hook / csm-hook.exe.
      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../csm-${{ matrix.target }}.tar.gz csm
          cd ../../..
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../csm-${{ matrix.target }}.zip csm.exe
          cd ../../..
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: csm-${{ matrix.target }}
          path: csm-${{ matrix.target }}.*

  upload-assets:
    needs: [resolve-release, build]
    if: ${{ !cancelled() && needs.resolve-release.result == 'success' && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with: { path: artifacts }
      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          sha256sum csm-*/* > ../SHA256SUMS.txt
          cat ../SHA256SUMS.txt
      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.resolve-release.outputs.tag_name }}
          files: |
            artifacts/csm-*/*
            SHA256SUMS.txt
      - name: Publish release
        run: gh release edit "$TAG" --draft=false
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve-release.outputs.tag_name }}
      - name: Bump Formula/claude-smart.rb in DaveDev42/homebrew-tap
        uses: DaveDev42/homebrew-tap-release@v1
        with:
          formula-name: claude-smart
          version: ${{ needs.resolve-release.outputs.tag_name }}
          download-url: https://github.com/DaveDev42/claude-smart/releases/download/${{ needs.resolve-release.outputs.tag_name }}/csm-aarch64-apple-darwin.tar.gz
          tap-token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  # crates.io publish via Trusted Publishing (OIDC — no static token).
  # Registered in the crates.io UI: DaveDev42/claude-smart, repo owner DaveDev42,
  # workflow `release-please.yml`, no environment. The action exchanges the job's
  # OIDC id-token for a short-lived crates.io token at runtime.
  # `cargo publish` is not idempotent, so guard on whether this exact version is
  # already on the index (re-runs / workflow_dispatch of an old tag would 409).
  publish-crate:
    needs: [resolve-release, build]
    if: ${{ !cancelled() && needs.resolve-release.result == 'success' && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Authenticate to crates.io (Trusted Publishing)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish if this version is new
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          ver="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import sys,json;print(json.load(sys.stdin)["packages"][0]["version"])')"
          echo "Cargo.toml version: $ver"
          if cargo search claude-smart | grep -q "^claude-smart = \"$ver\""; then
            echo "claude-smart $ver already on crates.io — skipping publish."
          else
            cargo publish
          fi
